version: '3.8'

services:
  # Основна база даних для нашого SaaS
  mongodb:
    image: mongo:6.0
    container_name: grosz_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secretpassword
      MONGO_INITDB_DATABASE: grosz_db
    volumes:
      - mongo_data:/data/db
    networks:
      - grosz_network

  # Redis знадобиться нам пізніше для сесій Telegram-бота 
  # та можливого кешування курсів валют (NBP API)
  redis:
    image: redis:7.0-alpine
    container_name: grosz_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - grosz_network

volumes:
  mongo_data:
    name: grosz_mongo_data
  redis_data:
    name: grosz_redis_data

networks:
  grosz_network:
    name: grosz_network
    driver: bridge